name = "crossborder-sg-api"
main = "worker-api/index.ts"
compatibility_date = "2026-07-17"
compatibility_flags = ["nodejs_compat"]

[vars]
ALLOWED_ORIGIN = "https://ncheewee.github.io"
# Set this to your Google OAuth Web client id to require verified Google sign-in
# for public API calls. Keep AUTH_REQUIRED as "false" while testing if needed.
GOOGLE_CLIENT_ID = ""
AUTH_REQUIRED = "false"
# Optional comma-separated controls:
# ALLOWED_EMAILS = "you@gmail.com"
# ALLOWED_DOMAINS = "yourdomain.com"

[triggers]
crons = ["*/5 * * * *"]
