name: Refresh Woodlands approach routes

on:
  schedule:
    - cron: "7 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Capture traffic-aware approach durations
        env:
          GOOGLE_ROUTES_API_KEY: ${{ secrets.GOOGLE_ROUTES_API_KEY }}
        run: node scripts/collect-woodlands-approaches.mjs
      - name: Publish updated approach snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/approaches.json docs/approaches.json
          git diff --cached --quiet || git commit -m "Refresh Woodlands approach routes"
          git push
