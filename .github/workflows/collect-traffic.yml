name: Collect checkpoint observations

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: collect-checkpoint-observations
  cancel-in-progress: true

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Collect both travel directions
        run: |
          curl --fail --silent --show-error --retry 3 \
            "https://crossborder-sg-mvp.ncheewee.chatgpt.site/api/traffic?direction=sg-my" \
            > /dev/null
          curl --fail --silent --show-error --retry 3 \
            "https://crossborder-sg-mvp.ncheewee.chatgpt.site/api/traffic?direction=my-sg" \
            > /dev/null
