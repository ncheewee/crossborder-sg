name: Collect checkpoint observations

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: collect-checkpoint-observations
  cancel-in-progress: true

jobs:
  collect:
    runs-on: ubuntu-latest
    env:
      TRAFFIC_API_BASE: ${{ vars.TRAFFIC_API_BASE || 'https://crossborder-sg-api.ncheewee.workers.dev' }}
      MONITOR_API_KEY: ${{ secrets.MONITOR_API_KEY }}
    steps:
      - name: Collect both travel directions
        run: |
          curl --fail --silent --show-error --retry 3 \
            --header "X-Monitor-Key: $MONITOR_API_KEY" \
            "$TRAFFIC_API_BASE/api/traffic?direction=sg-my" \
            > /dev/null
          curl --fail --silent --show-error --retry 3 \
            --header "X-Monitor-Key: $MONITOR_API_KEY" \
            "$TRAFFIC_API_BASE/api/traffic?direction=my-sg" \
            > /dev/null
