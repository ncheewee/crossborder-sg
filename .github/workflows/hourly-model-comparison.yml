name: Hourly model comparison

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

jobs:
  compare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Send hourly model comparison
        env:
          CROSSBORDER_API_BASE: https://crossborder-sg-api.ncheewee.workers.dev
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/hourly-model-comparison.mjs
